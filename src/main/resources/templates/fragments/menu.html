<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="menu">
    <style>
        :root {
            --gaspo-bg: #eef4f1;
            --gaspo-card: #ffffff;
            --gaspo-ink: #17231f;
            --gaspo-muted: #718077;
            --gaspo-line: #dce7e2;
            --gaspo-green: #2f7d5c;
            --gaspo-green-dark: #246349;
            --gaspo-soft: #f6faf8;
            --gaspo-danger: #b42318;
        }

        .app-nav {
            background: var(--gaspo-card);
            border-bottom: 1px solid var(--gaspo-line);
            box-shadow: 0 8px 24px rgba(23, 35, 31, 0.04);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .app-nav__inner {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .app-nav__brand {
            color: var(--gaspo-ink);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 17px;
            font-weight: 900;
            text-decoration: none;
            white-space: nowrap;
        }

        .app-nav__links {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            flex-wrap: wrap;
        }

        .app-nav__links a,
        .app-nav__logout {
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: #31443c;
            cursor: pointer;
            font: inherit;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 10px;
            text-decoration: none;
            text-align: center;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .app-nav__links a:hover,
        .app-nav__logout:hover {
            background: #f6faf8;
            color: var(--gaspo-green);
        }

        .app-nav__session {
            color: var(--gaspo-muted);
            font-size: 13px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .app-nav__logout-form {
            margin: 0;
        }

        .icon {
            display: inline-flex;
            width: 1.1em;
            justify-content: center;
            line-height: 1;
        }

        @media (max-width: 780px) {
            .app-nav__inner {
                align-items: flex-start;
                flex-direction: column;
                padding: 10px 0;
            }

            .app-nav__session {
                white-space: normal;
            }
        }
    </style>

    <nav class="app-nav" aria-label="Navegação principal">
        <div class="app-nav__inner">
            <a class="app-nav__brand" th:href="@{/web/avisos}">
                <span class="icon" aria-hidden="true">✚</span>
                <span>GASPO</span>
            </a>
            <div class="app-nav__links">
                <a th:href="@{/web/avisos}"><span class="icon" aria-hidden="true">🔔</span><span>Avisos</span></a>
                <a th:href="@{/web/consultas/agendar}"><span class="icon" aria-hidden="true">📅</span><span>Consultas</span></a>
                <a th:href="@{/web/unidades-saude}"><span class="icon" aria-hidden="true">📍</span><span>Postos</span></a>
                <a th:href="@{/web/profissionais}"><span class="icon" aria-hidden="true">🩺</span><span>Profissionais</span></a>
                <a th:href="@{/web/avaliacoes}"><span class="icon" aria-hidden="true">★</span><span>Avaliações</span></a>
                <a th:if="${session.usuarioTipo == 'FUNCIONARIO'}" th:href="@{/web/agendas}"><span class="icon" aria-hidden="true">🕒</span><span>Agenda</span></a>
                <a th:if="${session.usuarioTipo == 'FUNCIONARIO'}" th:href="@{/web/funcionarios}"><span class="icon" aria-hidden="true">👥</span><span>Funcionários</span></a>
                <a th:if="${session.usuarioNome == null}" th:href="@{/web/login}"><span class="icon" aria-hidden="true">↪</span><span>Login</span></a>
            </div>
            <div class="app-nav__session" th:if="${session.usuarioNome != null}">
                <span th:text="${session.usuarioNome}">Usuário</span>
                <span th:text="'(' + ${session.usuarioTipo} + ')'">(TIPO)</span>
                <form class="app-nav__logout-form" th:action="@{/web/logout}" method="post">
                    <button class="app-nav__logout" type="submit"><span class="icon" aria-hidden="true">↩</span><span>Sair</span></button>
                </form>
            </div>
        </div>
    </nav>
</div>
</body>
</html>
