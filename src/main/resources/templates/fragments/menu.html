<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="menu">
    <style>
        .app-nav {
            background: #ffffff;
            border-bottom: 1px solid #d6dbe1;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .app-nav__inner {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .app-nav__brand {
            color: #1f2933;
            font-weight: 800;
            text-decoration: none;
            white-space: nowrap;
        }

        .app-nav__links {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .app-nav__links a,
        .app-nav__logout {
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: #344054;
            cursor: pointer;
            font: inherit;
            font-size: 14px;
            font-weight: 700;
            padding: 8px 10px;
            text-decoration: none;
        }

        .app-nav__links a:hover,
        .app-nav__logout:hover {
            background: #eef2f5;
        }

        .app-nav__session {
            color: #667085;
            font-size: 13px;
            white-space: nowrap;
        }

        .app-nav__logout-form {
            margin: 0;
        }

        @media (max-width: 780px) {
            .app-nav__inner {
                align-items: flex-start;
                flex-direction: column;
                padding: 12px 0;
            }

            .app-nav__session {
                white-space: normal;
            }
        }
    </style>

    <nav class="app-nav" aria-label="Navegação principal">
        <div class="app-nav__inner">
            <a class="app-nav__brand" th:href="@{/web/avisos}">GASPO</a>
            <div class="app-nav__links">
                <a th:href="@{/web/avisos}">Avisos</a>
                <a th:href="@{/web/consultas/agendar}">Consultas</a>
                <a th:href="@{/web/agendas}">Agenda</a>
                <a th:href="@{/web/avaliacoes}">Avaliações</a>
                <a th:href="@{/web/funcionarios}">Funcionários</a>
                <a th:href="@{/web/login}">Login</a>
            </div>
            <div class="app-nav__session" th:if="${session.usuarioNome != null}">
                <span th:text="${session.usuarioNome}">Usuário</span>
                <span th:text="'(' + ${session.usuarioTipo} + ')'">(TIPO)</span>
                <form class="app-nav__logout-form" th:action="@{/web/logout}" method="post">
                    <button class="app-nav__logout" type="submit">Sair</button>
                </form>
            </div>
        </div>
    </nav>
</div>
</body>
</html>
