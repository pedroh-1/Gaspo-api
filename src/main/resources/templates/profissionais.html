<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profissionais</title>
    <style>
        :root {
            --bg: #eef4f1;
            --surface: #ffffff;
            --text: #17231f;
            --muted: #718077;
            --border: #dce7e2;
            --primary: #2f7d5c;
            --primary-hover: #246349;
            --danger: #b42318;
            --danger-bg: #fce8e6;
            --danger-text: #9b1c1c;
            --success-bg: #e8f5ef;
            --success-text: #246349;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
        }

        .page {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0;
        }

        .header { margin-bottom: 24px; }
        h1 { margin: 0; font-size: 28px; }
        h2 { margin: 0 0 16px; font-size: 18px; }
        .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 14px; line-height: 1.45; }

        .layout {
            display: grid;
            grid-template-columns: minmax(300px, 380px) 1fr;
            gap: 24px;
            align-items: start;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        label {
            display: block;
            margin: 14px 0 6px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        input, select {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            font: inherit;
            background: #fff;
        }

        button {
            min-height: 38px;
            border: 0;
            border-radius: 6px;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            font: inherit;
            font-weight: 800;
            padding: 0 12px;
        }

        button:hover { background: var(--primary-hover); }
        button.danger { background: var(--danger); }

        .alert {
            margin-bottom: 16px;
            border-radius: 6px;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 700;
        }

        .alert-success { background: var(--success-bg); color: var(--success-text); }
        .alert-danger { background: var(--danger-bg); color: var(--danger-text); }

        .professional-list {
            display: grid;
            gap: 12px;
        }

        .professional-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            padding: 16px;
        }

        .professional-card__header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 12px;
        }

        .professional-card h3 {
            margin: 0;
            color: var(--text);
            font-size: 17px;
            line-height: 1.3;
            overflow-wrap: anywhere;
        }

        .status-badge {
            flex: 0 0 auto;
            border-radius: 999px;
            background: var(--success-bg);
            color: var(--success-text);
            padding: 5px 10px;
            font-size: 12px;
            font-weight: 800;
        }

        .professional-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 10px 16px;
            margin: 0;
        }

        .professional-details div {
            min-width: 0;
        }

        .professional-details dt {
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 3px;
            text-transform: uppercase;
        }

        .professional-details dd {
            color: #31443c;
            font-size: 14px;
            line-height: 1.45;
            margin: 0;
            overflow-wrap: anywhere;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            border-top: 1px solid var(--border);
            margin-top: 14px;
            padding-top: 14px;
        }

        .actions form { margin: 0; }
        .actions select { min-width: 150px; }

        .empty {
            border: 1px dashed var(--border);
            border-radius: 8px;
            background: #fff;
            color: var(--muted);
            padding: 24px;
            text-align: center;
        }

        @media (max-width: 860px) {
            .layout { display: block; }
            .panel { margin-bottom: 18px; }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/menu :: menu}"></div>

<main class="page">
    <header class="header">
        <h1><span aria-hidden="true">🩺</span> Especialistas</h1>
        <p class="subtitle">Cadastre profissionais, vincule unidades de saúde e acompanhe o status de atendimento.</p>
    </header>

    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <section class="layout">
        <form class="panel" th:if="${session.usuarioTipo == 'FUNCIONARIO'}" th:action="@{/web/profissionais}" method="post">
            <h2>Novo profissional</h2>
            <label for="nome">Nome</label>
            <input id="nome" name="nome" required>

            <label for="especialidade">Especialidade</label>
            <input id="especialidade" name="especialidade" placeholder="Clínico geral, Pediatria...">

            <label for="email">E-mail</label>
            <input id="email" name="email" type="email">

            <label for="telefone">Telefone</label>
            <input id="telefone" name="telefone">

            <label for="status">Status</label>
            <select id="status" name="status">
                <option th:each="status : ${statusProfissional}"
                        th:value="${status}"
                        th:text="${status}">
                </option>
            </select>

            <label for="unidadeSaudeId">Unidade de saúde</label>
            <select id="unidadeSaudeId" name="unidadeSaudeId">
                <option value="">Sem unidade vinculada</option>
                <option th:each="unidade : ${unidades}"
                        th:value="${unidade.id}"
                        th:text="${unidade.nome + (unidade.endereco != null ? ' - ' + unidade.endereco : '')}">
                </option>
            </select>

            <button type="submit" style="margin-top: 16px;">＋ Cadastrar</button>
        </form>

        <section class="panel">
            <h2>Profissionais cadastrados</h2>
            <div th:if="${#lists.isEmpty(profissionais)}" class="empty">
                Nenhum profissional cadastrado.
            </div>

            <div class="professional-list" th:unless="${#lists.isEmpty(profissionais)}">
                <article class="professional-card" th:each="profissional : ${profissionais}">
                    <div class="professional-card__header">
                        <h3 th:text="${profissional.nome}">Nome</h3>
                        <span class="status-badge" th:text="${profissional.status}">ATENDENDO</span>
                    </div>

                    <dl class="professional-details">
                        <div>
                            <dt>Especialidade</dt>
                            <dd th:text="${profissional.especialidade ?: 'Geral'}">Especialidade</dd>
                        </div>
                        <div>
                            <dt>E-mail</dt>
                            <dd th:text="${profissional.email ?: 'E-mail não informado'}">E-mail</dd>
                        </div>
                        <div>
                            <dt>Telefone</dt>
                            <dd th:text="${profissional.telefone ?: 'Telefone não informado'}">Telefone</dd>
                        </div>
                        <div>
                            <dt>Unidade</dt>
                            <dd th:text="${profissional.unidadeSaude != null ? profissional.unidadeSaude.nome : 'Não vinculada'}">Unidade</dd>
                        </div>
                        <div th:if="${profissional.unidadeSaude != null && profissional.unidadeSaude.endereco != null}">
                            <dt>Localização</dt>
                            <dd th:text="${profissional.unidadeSaude.endereco}">Localização</dd>
                        </div>
                    </dl>

                    <div class="actions" th:if="${session.usuarioTipo == 'FUNCIONARIO'}">
                        <form th:action="@{/web/profissionais/{id}/status(id=${profissional.id})}" method="post">
                            <select name="status" aria-label="Status do profissional">
                                <option th:each="status : ${statusProfissional}"
                                        th:value="${status}"
                                        th:selected="${status == profissional.status}"
                                        th:text="${status}">
                                </option>
                            </select>
                            <button type="submit">✓ Salvar</button>
                        </form>
                        <form th:action="@{/web/profissionais/{id}/remover(id=${profissional.id})}" method="post">
                            <button class="danger" type="submit">🗑 Remover</button>
                        </form>
                    </div>
                </article>
            </div>
        </section>
    </section>
</main>
</body>
</html>
