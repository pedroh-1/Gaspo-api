<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Paciente</title>
    <style>
        :root {
            --bg: #f5f7f9;
            --surface: #ffffff;
            --text: #1f2933;
            --muted: #667085;
            --border: #d6dbe1;
            --primary: #1f7a5c;
            --primary-hover: #176448;
            --danger-bg: #fce8e6;
            --danger-text: #9b1c1c;
            --success-bg: #e7f5ec;
            --success-text: #176448;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
        }

        .page {
            width: min(560px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 22px;
        }

        h1 { margin: 0; font-size: 28px; }

        .subtitle {
            margin: 8px 0 22px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.45;
        }

        label {
            display: block;
            margin: 14px 0 6px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            font: inherit;
        }

        button {
            width: 100%;
            min-height: 42px;
            margin-top: 18px;
            border: 0;
            border-radius: 6px;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            font: inherit;
            font-weight: 800;
        }

        button:hover { background: var(--primary-hover); }

        .alert {
            margin-bottom: 16px;
            border-radius: 6px;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 700;
        }

        .alert-success { background: var(--success-bg); color: var(--success-text); }
        .alert-danger { background: var(--danger-bg); color: var(--danger-text); }

        .footer-link {
            margin-top: 16px;
            color: var(--muted);
            font-size: 14px;
            text-align: center;
        }

        .footer-link a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/menu :: menu}"></div>

<main class="page">
    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <form class="panel" th:action="@{/web/cadastro}" th:object="${cadastro}" method="post">
        <h1>Cadastro de paciente</h1>
        <p class="subtitle">
            Crie sua conta para acessar agendamentos, avisos e demais serviços do GASPO.
        </p>

        <label for="nome">Nome completo</label>
        <input id="nome" th:field="*{nome}" required>

        <label for="cpf">CPF</label>
        <input id="cpf" th:field="*{cpf}" inputmode="numeric" placeholder="Somente números" required>

        <label for="email">E-mail</label>
        <input id="email" th:field="*{email}" type="email" required>

        <label for="senha">Senha</label>
        <input id="senha" th:field="*{senha}" type="password" minlength="6" required>

        <button type="submit">Criar conta</button>
    </form>

    <p class="footer-link">
        Já possui conta? <a th:href="@{/web/login}">Entrar</a>
    </p>
</main>
</body>
</html>
