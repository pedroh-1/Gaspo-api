<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendar Consulta</title>
    <!-- Adicionando um pouco de CSS para deixar bonito -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-weight: bold;
        }
        input[type="datetime-local"],
        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Para não ultrapassar o width */
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #218838;
        }
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Agendamento de Consulta</h2>

    <!-- Mensagens de Sucesso ou Erro -->
    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <form action="#" th:action="@{/web/consultas/agendar}" th:object="${form}" method="post">
        
        <div class="form-group">
            <label for="data">Data e Hora da Consulta:</label>
            <input type="datetime-local" id="data" th:field="*{data}" required />
        </div>

        <div class="form-group">
            <label for="lotacaoId">Profissional / Unidade de Saúde:</label>
            <select id="lotacaoId" th:field="*{lotacaoId}" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px;" required>
                <option value="" disabled selected>Selecione um profissional...</option>
                <option th:each="lotacao : ${lotacoes}"
                        th:value="${lotacao.id}"
                        th:text="${lotacao.nomeProfissional} + ' - ' + (${lotacao.especialidadeProfissional} ?: 'Geral') + ' - ' + ${lotacao.nomeUnidade}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label for="prontuarioId">ID do Prontuário do Paciente:</label>
            <input type="number" id="prontuarioId" th:field="*{prontuarioId}" placeholder="Ex: 2629" required />
        </div>

        <button type="submit">Confirmar Agendamento</button>

    </form>
</div>

</body>
</html>
