<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funcionários</title>
    <style>
        :root {
            --bg: #eef4f1;
            --surface: #ffffff;
            --text: #17231f;
            --muted: #718077;
            --border: #dce7e2;
            --primary: #2f7d5c;
            --primary-hover: #246349;
            --danger-bg: #fce8e6;
            --danger-text: #9b1c1c;
            --success-bg: #e8f5ef;
            --success-text: #246349;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
        }

        .page {
            width: min(1100px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0;
        }

        .header { margin-bottom: 24px; }
        h1 { margin: 0; font-size: 28px; }
        h2 { margin: 0 0 16px; font-size: 18px; }
        .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 14px; }

        .layout {
            display: grid;
            grid-template-columns: minmax(280px, 360px) 1fr;
            gap: 24px;
            align-items: start;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        label {
            display: block;
            margin: 14px 0 6px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            font: inherit;
        }

        button {
            min-height: 40px;
            margin-top: 16px;
            border: 0;
            border-radius: 6px;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            font: inherit;
            font-weight: 800;
            padding: 0 14px;
        }

        button:hover { background: var(--primary-hover); }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border-bottom: 1px solid var(--border);
            padding: 12px 10px;
            text-align: left;
            font-size: 14px;
        }

        th {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
        }

        .alert {
            margin-bottom: 16px;
            border-radius: 6px;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 700;
        }

        .alert-success { background: var(--success-bg); color: var(--success-text); }
        .alert-danger { background: var(--danger-bg); color: var(--danger-text); }

        @media (max-width: 820px) {
            .layout { display: block; }
            .panel { margin-bottom: 18px; overflow-x: auto; }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/menu :: menu}"></div>

<main class="page">
    <header class="header">
        <h1><span aria-hidden="true">👥</span> Funcionários</h1>
        <p class="subtitle">Cadastre funcionários que podem fazer login e gerenciar avisos.</p>
    </header>

    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <section class="layout">
        <form class="panel" th:action="@{/web/funcionarios}" method="post">
            <h2>Novo funcionário</h2>
            <label for="nome">Nome</label>
            <input id="nome" name="nome" required>

            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" required>

            <label for="telefone">Telefone</label>
            <input id="telefone" name="telefone">

            <label for="cargo">Cargo</label>
            <input id="cargo" name="cargo">

            <label for="senha">Senha</label>
            <input id="senha" name="senha" type="password" required>

            <button type="submit">＋ Cadastrar</button>
        </form>

        <section class="panel">
            <h2>Funcionários cadastrados</h2>
            <table>
                <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Telefone</th>
                    <th>Cargo</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="funcionario : ${funcionarios}">
                    <td th:text="${funcionario.nome}">Nome</td>
                    <td th:text="${funcionario.email}">email@gaspo</td>
                    <td th:text="${funcionario.telefone ?: 'Não informado'}">Telefone</td>
                    <td th:text="${funcionario.cargo ?: 'Não informado'}">Cargo</td>
                </tr>
                </tbody>
            </table>
        </section>
    </section>
</main>
</body>
</html>
