<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        :root {
            --bg: #eef4f1;
            --surface: #ffffff;
            --text: #17231f;
            --muted: #718077;
            --border: #dce7e2;
            --primary: #2f7d5c;
            --primary-hover: #246349;
            --danger-bg: #fce8e6;
            --danger-text: #9b1c1c;
            --success-bg: #e8f5ef;
            --success-text: #246349;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
        }

        .page {
            width: min(520px, calc(100% - 32px));
            margin: 0 auto;
            padding: 32px 0;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 22px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
            text-align: left;
            font-weight: 800;
        }

        .subtitle {
            margin: 8px 0 22px;
            color: var(--muted);
            font-size: 14px;
            text-align: left;
        }

        .role-picker {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 22px;
        }

        .role-picker input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .role-pill {
            display: block;
            margin: 0;
        }

        .role-pill span {
            display: block;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            color: var(--text);
            padding: 10px 12px;
            text-align: center;
            font-weight: 700;
            cursor: pointer;
        }

        .role-picker input:checked + span {
            background: #e8f5ef;
            border-color: #b9ded0;
            color: var(--primary);
        }

        .role-picker input:focus + span {
            outline: 2px solid rgba(47, 125, 92, 0.22);
            outline-offset: 2px;
        }

        label {
            display: block;
            margin: 14px 0 6px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        input {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            font: inherit;
        }

        button {
            width: 100%;
            min-height: 42px;
            margin-top: 18px;
            border: 0;
            border-radius: 6px;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
        }

        button:hover { background: var(--primary-hover); }

        .alert {
            margin-bottom: 16px;
            border-radius: 6px;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 700;
        }

        .alert-success { background: var(--success-bg); color: var(--success-text); }
        .alert-danger { background: var(--danger-bg); color: var(--danger-text); }

        .footer-link {
            margin-top: 16px;
            color: var(--muted);
            font-size: 14px;
            text-align: center;
        }

        .footer-link a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/menu :: menu}"></div>

<main class="page">
    <div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>
    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <form class="panel" th:action="@{/web/login}" method="post">
        <h1><span aria-hidden="true">✚</span> GASPO</h1>
        <p class="subtitle">Entrar como:</p>
        <div class="role-picker" aria-label="Tipo de acesso">
            <label class="role-pill">
                <input type="radio" name="tipoAcesso" value="USUARIO" checked>
                <span>Usuário</span>
            </label>
            <label class="role-pill">
                <input type="radio" name="tipoAcesso" value="FUNCIONARIO">
                <span>Funcionário</span>
            </label>
        </div>

        <p class="subtitle">Conecte-se para acessar o aplicativo:</p>

        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" placeholder="seuemail@exemplo.com" required>

        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" required>

        <button type="submit">↪ Login</button>
    </form>

    <p class="footer-link">
        Ainda não tem uma conta? <a th:href="@{/web/cadastro}">Cadastrar-se</a>
    </p>
</main>
</body>
</html>
